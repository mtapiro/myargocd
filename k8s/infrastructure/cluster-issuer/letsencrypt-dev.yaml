apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dev
spec:
  acme:
    # Staging server for dev (no rate limits, but browser shows certificate warning)
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: tapiromeir@gmail.com
    privateKeySecretRef:
      name: letsencrypt-dev
    solvers:
      - http01:
          ingress:
            class: nginx
