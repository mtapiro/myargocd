apiVersion: v1
kind: Config
clusters:
- cluster:
    server: https://8CA5BCBB49BF4D7BACECDCBD61429957.sk1.eu-west-1.eks.amazonaws.com
    certificate-authority-data: 
  name: example-eks-cluster
contexts:
- context:
    cluster: example-eks-cluster
    user: example-eks-cluster
  name: example-eks-cluster
current-context: example-eks-cluster
users:
- name: example-eks-cluster
  user:
    exec:
      apiVersion: client.authentication.k8s.io/v1beta1
      command: aws
      args:
        - eks
        - get-token
        - --cluster-name
        - example-eks-cluster
        - --region
        - eu-west-1
