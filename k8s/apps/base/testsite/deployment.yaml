apiVersion: apps/v1
kind: Deployment
metadata:
  name: testsite
  labels:
    app: testsite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testsite
  template:
    metadata:
      labels:
        app: testsite
    spec:
      nodeSelector:
        node.type: node.small
      containers:
        - name: testsite
          image: 609177096835.dkr.ecr.eu-west-1.amazonaws.com/utils/testsite:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "300m"
              memory: "150Mi"
