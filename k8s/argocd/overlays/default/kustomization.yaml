apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - ../../base
  # Choose one ingress option:
  # - ingress-alb.yaml      # For AWS ALB + ACM certificate
  - ingress-nginx.yaml      # For NGINX Ingress + Let's Encrypt

patches:
