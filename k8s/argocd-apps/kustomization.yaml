apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # AppProject definitions
  - projects/workloads-project.yaml
  - projects/infrastructure-project.yaml

  # Infrastructure applications (deployed first via sync-wave)
  - applications/aws-load-balancer-controller.yaml
  - applications/cert-manager.yaml
  - applications/nginx-ingress.yaml
  - applications/cluster-issuer.yaml

  # ApplicationSet for workloads (auto-discovers apps)
  - applicationsets/workloads-appset.yaml

  # Root application (optional - for bootstrapping)
  # Uncomment after initial setup to enable full GitOps
  # - base/root-app.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/part-of: argocd-apps
    includeSelectors: false
